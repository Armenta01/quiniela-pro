<!DOCTYPE html>
<html>
<head>
  <title>🏆 Historial</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>🏆 Historial de Campeones</h1>

<div id="historial"></div>

<button class="btn-volver" onclick="volver()">
⬅️ Volver a Quiniela
</button>

<script>
async function cargarHistorial() {
  const res = await fetch('/historial-campeones');
  const data = await res.json();

  const cont = document.getElementById('historial');

  if (!data.length) {
    cont.innerHTML = "No hay historial aún";
    return;
  }

  let html = `
    <table class="tabla-historial">
      <tr>
        <th>#</th>
        <th>Jornada</th>
        <th>Jugador</th>
        <th>Puntos</th>
      </tr>
  `;

  data.forEach((h) => {

  html += `
    <tr class="campeon-row">
      <td>🏆</td>
      <td>Semana ${h.jornada}</td>
      <td>
        <strong>${h.nombre}</strong>
      </td>
      <td>
        ${h.puntos} pts
      </td>
    </tr>
  `;
});

  html += "</table>";

  cont.innerHTML = html;
}

function volver() {
  window.location.href = "/";
}

cargarHistorial();
</script>

</body>
</html>
