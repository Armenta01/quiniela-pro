<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="styles.css">

  <title>Estadísticas</title>
</head>

<div id="estadisticas"></div>

<a href="/" class="btn-main">
  ⬅️ Volver al Inicio
</a>

<script>

async function cargarEstadisticas() {

  try {

    const res = await fetch('/estadisticas');
    const data = await res.json();

    document.getElementById('estadisticas').innerHTML = `

      <div class="stat-card">
        <div class="stat-numero">${data.usuarios}</div>
        <div class="stat-texto">Usuarios Registrados</div>
      </div>

      <div class="stat-card">
        <div class="stat-numero">${data.quinielas}</div>
        <div class="stat-texto">Quinielas Capturadas</div>
      </div>

      <div class="stat-card">
        <div class="stat-numero">${data.campeones}</div>
        <div class="stat-texto">Campeonatos Entregados</div>
      </div>

      <div class="stat-card">
        <div class="stat-numero">${data.recordNombre}</div>
        <div class="stat-texto">Récord Histórico</div>
      </div>

      <div class="stat-card">
        <div class="stat-numero">${data.recordPuntos} pts</div>
        <div class="stat-texto">Mayor Puntaje Registrado</div>
      </div>

    `;

  } catch (err) {

    console.error(err);

    document.getElementById('estadisticas').innerHTML = `
      <div class="stat-card">
        <div class="stat-texto">
          Error cargando estadísticas
        </div>
      </div>
    `;
  }
}

cargarEstadisticas();

</script>
