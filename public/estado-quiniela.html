<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Estado de Quinielas</title>

<link rel="stylesheet" href="styles.css">

<style>

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#0f1830;
    margin:0;
    padding:30px;
    color:white;
}

h1{
    text-align:center;
    color:#FFC107;
    margin-bottom:30px;
}

.barra-superior{

    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;

    margin-bottom:25px;

}

.barra-superior label{

    font-size:18px;
    font-weight:bold;

}

.barra-superior select{

    background:#121b31;
    color:white;
    padding:10px 15px;
    border-radius:8px;
    border:1px solid #42557c;
    font-size:16px;

}

table{

    width:100%;

    border-collapse:collapse;

    background:#121b31;

    border-radius:15px;

    overflow:hidden;

}

th{

    background:#0d1427;
    color:white;
    padding:14px;

}

td{

    padding:12px;
    color:white;
    text-align:center;
    border-bottom:1px solid #2d3b59;
    color:#222;
    font-size:16px;
    font-weight:500;

}

button{

    border:none;
    border-radius:8px;
    padding:10px 18px;
    font-weight:bold;
    cursor:pointer;
    color:white;
    transition:.2s;

}

.btnPagado{

    background:#28a745;

}

.btnPagado:hover{

    background:#218838;

}

.btnPendiente{

    background:#6c757d;

}

.btnPendiente:hover{

    background:#545b62;

}

.estado{

    display:inline-block;
    padding:6px 12px;
    border-radius:20px;
    font-weight:bold;
    color:white;

}

.estado.pendiente{

    background:#ffc107;
    color:#222;

}

.estado.pagado{

    background:#28a745;
    color:white;

}

.resumen{

    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
    margin-bottom:30px;

}

.card{

    width:180px;
    background: #121b31;
    border-radius:12px;
    padding:20px;
    text-align:center;
    color:white;
    box-shadow:0 3px 8px rgba(0,0,0,.15);

}

.card h3{

    margin:0;
    font-size:34px;

}

.card span{

    color:#cfd8dc;
    font-weight:bold;

}

.cardVerde{

    border-top:6px solid #28a745;

}

.cardAmarilla{

    border-top:6px solid #ffc107;

}

.cardAzul{

    border-top:6px solid #007bff;

}

.contenedorBusqueda{

    display:flex;
    justify-content:center;
    margin-bottom:20px;

}

#buscar{

    background:#121b31;
    color:white;
    width:450px;
    max-width:90%;
    padding:12px 18px;
    border-radius:30px;
    border:1px solid #3d4d72;
    font-size:17px;
    outline:none;

}

#buscar::placeholder{

    color:#bfc6d1;

}

#buscar:focus{

    border:2px solid #FFC107;

}

/* ========================= */
/* MODAL */
/* ========================= */

.modal{

    display:none;

    position:fixed;

    left:0;
    top:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,.55);

    justify-content:center;
    align-items:center;

    z-index:9999;

}

.modalContenido{

    width:420px;
    max-width:90%;

    background: #202b42;

    color:white;

    border-radius:15px;

    padding:30px;

    text-align:center;

    box-shadow:0 15px 40px rgba(0,0,0,.35);

}

.modalContenido h2{

    margin-top:0;

    color:#FFC107;

}

.modalContenido p{

    font-size:18px;

    margin:25px 0;

}

.modalBotones{

    display:flex;

    justify-content:center;

    gap:15px;

}

.btnCancelar{

    background:#6c757d;

}

.btnConfirmar{

    background:#28a745;

}

.filaPagado{

    border-left:8px solid #28a745;

    background:#f3fff5;

}

.filaPendiente{

    border-left:8px solid #ffc107;

    background:#fffdf2;

}

@media(max-width:768px){

    .resumen{

        flex-direction:column;

        align-items:center;

    }

    .card{

        width:90%;

    }

    table{

        font-size:14px;

    }

    th,
    td{

        padding:8px;

    }

    #buscar{

        width:95%;

    }

    .modalContenido{

        width:95%;

        padding:20px;

    }

    .modalBotones{

        flex-direction:column;

    }

    .modalBotones button{

        width:100%;

    }

}

</style>

</head>

<body>

<h1>💰 Estado de Quinielas</h1>

<div class="barra-superior">

<label>Jornada</label>

<select id="jornadaSelect">

</select>

</div>

<div class="resumen">

    <div class="card">
        <h3 id="totalParticipantes">0</h3>
        <span>Participantes</span>
    </div>

    <div class="card cardVerde">
        <h3 id="totalPagados">0</h3>
        <span>Pagados</span>
    </div>

    <div class="card cardAmarilla">
        <h3 id="totalPendientes">0</h3>
        <span>Pendientes</span>
    </div>

    <div class="card cardAzul">
        <h3 id="totalRecaudado">$0</h3>
        <span>Recaudado</span>
    </div>

</div>

<br>

<div class="contenedorBusqueda">

    <input
        type="text"
        id="buscar"
        placeholder="🔍 Buscar participante o teléfono..."
    >

</div>

<br>

<table>

<thead>

<tr>

<th>Participante</th>
<th>Teléfono</th>
<th>Fecha</th>
<th>Estado</th>
<th>Acción</th>

</tr>

</thead>

<tbody id="tablaQuinielas">

</tbody>

</table>

<!-- ========================= -->
<!-- MODAL CONFIRMAR PAGO -->
<!-- ========================= -->

<div id="modalEstado" class="modal">

    <div class="modalContenido">

        <h2>💰 Confirmar cambio</h2>

        <p id="modalMensaje"></p>

        <div class="modalBotones">

            <button id="btnCancelar" class="btnCancelar">
                Cancelar
            </button>

            <button id="btnConfirmar" class="btnConfirmar">
                Confirmar
            </button>

        </div>

    </div>

</div>

<script src="estado-quiniela.js"></script>

</body>

</html>
