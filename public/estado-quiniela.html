<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Estado de Quinielas</title>

<link rel="stylesheet" href="styles.css">

<style>

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:30px;
}

h1{
    text-align:center;
    color:#FFC107;
    margin-bottom:30px;
}

.barra-superior{

    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;

    margin-bottom:25px;

}

.barra-superior label{

    font-size:18px;
    font-weight:bold;

}

.barra-superior select{

    padding:10px 15px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:16px;

}

table{

    width:100%;
    border-collapse:collapse;
    background:white;

}

th{

    background:#222;
    color:white;
    padding:14px;

}

td{

    padding:12px;
    text-align:center;
    border-bottom:1px solid #ddd;
    color:#222;
    font-size:16px;
    font-weight:500;

}

button{

    background:#28a745;
    color:white;
    border:none;
    border-radius:8px;
    padding:10px 18px;
    font-weight:bold;
    cursor:pointer;

}

button:hover{

    background:#218838;

}

.estado{

    display:inline-block;
    padding:6px 12px;
    border-radius:20px;
    font-weight:bold;
    color:white;

}

.estado.pendiente{

    background:#ffc107;
    color:#222;

}

.estado.pagado{

    background:#28a745;
    color:white;

}

</style>

</head>

<body>

<h1>💰 Estado de Quinielas</h1>

<div class="barra-superior">

<label>Jornada</label>

<select id="jornadaSelect">

</select>

</div>

<table>

<thead>

<tr>

<th>Participante</th>
<th>Teléfono</th>
<th>Fecha</th>
<th>Estado</th>
<th>Acción</th>

</tr>

</thead>

<tbody id="tablaQuinielas">

</tbody>

</table>

<script src="estado-quiniela.js"></script>

</body>

</html>
