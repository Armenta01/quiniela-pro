<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabla Quiniela</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>
  <div style="text-align:left; margin:10px;">
  <button style="
    background:#1e293b;
    color:white;
    padding:8px 12px;
    border-radius:8px;
  " onclick="window.location.href='index.html'">
    ⬅️ Volver
  </button>
</div>

<h1>🏆 Tabla General</h1>

<select id="jornadaSelect"></select>
<div id="partidosResumen"></div>

<div id="tabla" class="tabla-scroll"></div>

<!-- 🔥 IMPORTANTE: cargar tu lógica -->
<script src="app.js"></script>

<script>
window.onload = async () => {

  const params = new URLSearchParams(window.location.search);
  const jornadaURL = params.get("jornada");

  await cargarJornadas();

  if (jornadaURL) {
    document.getElementById("jornadaSelect").value = jornadaURL;
  }

  const jornada = document.getElementById("jornadaSelect").value;

  // 🔥 usar tu función PRO
  verTablaCompleta(jornada);
  cargarResumenPartidos(jornada);
  
  document.getElementById("jornadaSelect").onchange = function() {
  const j = this.value;
  verTablaCompleta(j);
  cargarResumenPartidos(j);
};
};

async function cargarResumenPartidos(jornada) {

  const res = await fetch(`/partidos?jornada=${jornada}`);
  const partidos = await res.json();

  const cont = document.getElementById("partidosResumen");

  

  partidos.forEach(p => {

    let marcador = (p.goles_local != null && p.goles_visitante != null)
  ? `${p.goles_local}-${p.goles_visitante}`
  : "⏳";

    html += `
  <div style="
    min-width:120px;
    flex:0 0 auto;
    background:#1e293b;
    padding:8px;
    border-radius:10px;
    text-align:center;
    font-size:12px;
  ">
        <div>${p.local}</div>
        <div style="font-weight:bold">${marcador}</div>
        <div>${p.visitante}</div>
      </div>
    `;
  });

  html += `</div>`;

  cont.innerHTML = html;
}
</script>

</body>
</html>
