<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabla Quiniela</title>

<link rel="stylesheet" href="styles.css">
<link rel="icon" type="image/png" href="/logo.png">
</head>

<body>
  <div style="text-align:left; margin:10px;">
  <button style="
    background:#1e293b;
    color:white;
    padding:8px 12px;
    border-radius:8px;
  " onclick="window.location.href='index.html'">
    ⬅️ Volver
  </button>
</div>

<h1>🏆 Tabla General</h1>

<select id="jornadaSelect"></select>

<div style="
  max-width:700px;
  margin:15px auto;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
">

 <input
  id="buscarJugador"
  placeholder="🔍 Buscar"
  style="
    padding:7px 10px;
    border-radius:8px;
    border:none;
    width:140px;
    font-size:13px;
  "
>

  <button onclick="verMiPosicion()">
    🎯 Ver mi posición
  </button>

</div>


<div id="tabla" class="tabla-scroll"></div>



<!-- 🔥 IMPORTANTE: cargar tu lógica -->
<script src="app.js"></script>

<script>

  window.onload = async () => {

  const params = new URLSearchParams(window.location.search);
  const jornadaURL = params.get("jornada");

  await cargarJornadas();

  if (jornadaURL) {
    document.getElementById("jornadaSelect").value = jornadaURL;
  }

  const jornada = document.getElementById("jornadaSelect").value;

  verTablaCompleta(jornada);

  document.getElementById("jornadaSelect").onchange = function() {
    const j = this.value;
    verTablaCompleta(j);
  };

};

async function cargarResumenPartidos(jornada) {

  const res = await fetch(`/partidos?jornada=${jornada}`);
  const partidos = await res.json();

  const cont = document.getElementById("partidosResumen");
  let html = `
<div style="
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px;
">
`;
  partidos.forEach(p => {

    let marcador = (p.goles_local != null && p.goles_visitante != null)
  ? `${p.goles_local}-${p.goles_visitante}`
  : "⏳";

    html += `
  <div style="
    min-width:120px;
    flex:0 0 auto;
    background:#1e293b;
    padding:8px;
    border-radius:10px;
    text-align:center;
    font-size:12px;
  ">
        <div>${p.local}</div>
        <div style="font-weight:bold">${marcador}</div>
        <div>${p.visitante}</div>
      </div>
    `;
  });

  html += `</div>`;

  cont.innerHTML = html;
}
</script>

</body>
</html>
