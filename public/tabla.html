<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabla Quiniela</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<h1>🏆 Tabla General</h1>

<select id="jornadaSelect"></select>

<div id="tabla"></div>

<!-- 🔥 IMPORTANTE: cargar tu lógica -->
<script src="app.js"></script>

<script>
window.onload = async () => {

  const params = new URLSearchParams(window.location.search);
  const jornadaURL = params.get("jornada");

  await cargarJornadas();

  if (jornadaURL) {
    document.getElementById("jornadaSelect").value = jornadaURL;
  }

  const jornada = document.getElementById("jornadaSelect").value;

  // 🔥 usar tu función PRO
  verTablaCompleta(jornada);

  document.getElementById("jornadaSelect").onchange = function() {
    verTablaCompleta(this.value);
  };
};
</script>

</body>
</html>
