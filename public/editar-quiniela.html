<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Editor de Quinielas | Quinielas El Inge</title>

    <link rel="stylesheet" href="editar-quiniela.css">

    <link rel="icon"
          type="image/png"
          href="logo.png">

</head>

<body>

<div class="admin-container">

    <div class="titulo-editor">

        <h1>📝 Editor de Quinielas</h1>

        <p>
            Selecciona una jornada, busca un participante y modifica sus pronósticos.
        </p>

    </div>

    <div class="barra-superior">

        <div class="campo">

            <label for="jornadaEditar">
                📅 Jornada
            </label>

            <select id="jornadaEditar"></select>

        </div>

        <div class="campo">

            <label for="buscarJugador">
                🔍 Buscar participante
            </label>

            <input
                id="buscarJugador"
                type="text"
                autocomplete="off"
                placeholder="Escribe el nombre...">

        </div>

    </div>

    <div class="contenedor-principal">

        <!-- Participantes -->

        <div class="panel panel-jugadores">

            <div class="panel-titulo">

                👥 Participantes

            </div>

            <div id="listaJugadores"></div>

        </div>

        <!-- Pronósticos -->

        <div class="panel panel-pronosticos">

            <div class="panel-titulo">

                <span id="tituloJugador">

                    Selecciona un participante

                </span>

            </div>

            <div id="listaPronosticos"></div>

        </div>

    </div>

    <div class="barra-inferior">

        <button
            id="btnGuardar"
            onclick="guardarCambiosPronosticos()">

            💾 Guardar cambios

        </button>

    </div>

</div>

<script src="editar-quiniela.js"></script>

</body>
</html>
