<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Quiniela</title>

  <style>
    body {
      font-family: Arial;
      background: #0b1d3a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .card {
      background: #132a4f;
      padding: 20px;
      border-radius: 15px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    /* 🔥 NUEVO: contenedor flexible */
    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .form-row input,
    .form-row select,
    .form-row button {
      flex: 1;
      min-width: 140px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    input, select {
      background: #eee;
      color: black;
    }

    button {
      background: #00c853;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #00a844;
    }

    .msg {
      margin-top: 10px;
      font-weight: bold;
    }

    .lista {
      margin-top: 30px;
    }

    .partido {
      background: #1f3c6b;
      padding: 10px;
      border-radius: 10px;
      margin: 5px;
    }

    /* 📱 RESPONSIVE */
    @media (max-width: 768px) {
      .form-row {
        flex-direction: column;
      }

      .card {
        width: 90%;
      }
    }

    button[onclick="resetearTodo()"] {
  background: linear-gradient(90deg, #ff0000, #ff4d4d);
  box-shadow: 0 0 10px red;
}

button[onclick="resetearTodo()"]:hover {
  transform: scale(1.05);
}

  </style>
</head>
<body>

<h1>⚙️ Panel Admin Quiniela</h1>

<div class="card">

  <div class="form-row">

    <input type="text" id="local" placeholder="Equipo local">
    <input type="text" id="visitante" placeholder="Equipo visitante">

    <input type="datetime-local" id="fecha">

    <input type="text" id="liga" placeholder="Ej: Liga MX J13">

    <input type="text" id="logo_local" placeholder="URL logo local">
    <input type="text" id="logo_visitante" placeholder="URL logo visitante">

    <select id="jornada">
  <option value="1">Semana 1</option>
  <option value="2">Semana 2</option>
  <option value="3">Semana 3</option>
  <option value="4">Semana 4</option>
  <option value="5">Semana 5</option>
  <option value="6">Semana 6</option>
  <option value="7">Semana 7</option>
  <option value="8">Semana 8</option>
  <option value="9">Semana 9</option>
  <option value="10">Semana 10</option>
  <option value="11">Semana 11</option>
  <option value="12">Semana 12</option>
  <option value="13">Semana 13</option>
  <option value="14">Semana 14</option>
  <option value="15">Semana 15</option>
  <option value="16">Semana 16</option>
  <option value="17">Semana 17</option>
  <option value="18">Semana 18</option>
  <option value="19">Semana 19</option>
  <option value="20">Semana 20</option>
</select>

    <button onclick="cargarPartidos()">Ver Jornada</button>
  
    <button onclick="crearPartido()">Crear Partido</button>

    <button onclick="resetearTodo()" style="
  background:red;
  color:white;
  padding:10px;
  border:none;
  border-radius:8px;
  margin-top:10px;
">
  ⚠️ Reset Temporada
</button>
  </div>

  <div class="msg" id="msg"></div>

</div>

<div class="lista" id="lista"></div>

<script>

async function crearPartido() {
  const local = document.getElementById('local').value;
  const visitante = document.getElementById('visitante').value;
  const fecha = document.getElementById('fecha').value;
  const jornada = document.getElementById('jornada').value;
  const liga = document.getElementById('liga').value;
  const logo_local = document.getElementById('logo_local').value;
  const logo_visitante = document.getElementById('logo_visitante').value;

  const msg = document.getElementById('msg');

  if (!local || !visitante || !fecha) {
    msg.innerText = "⚠️ Completa todos los campos";
    msg.style.color = "orange";
    return;
  }

  try {
    const liga = document.getElementById('liga').value;
const logo_local = document.getElementById('logo_local').value;
const logo_visitante = document.getElementById('logo_visitante').value;

const res = await fetch('/admin/partidos', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({
    local,
    visitante,
    fecha,
    jornada,
    liga,
    logo_local,
    logo_visitante
  })
});

    const data = await res.json();

    if (data.ok) {
      msg.innerText = "✅ Partido guardado";
      msg.style.color = "lightgreen";

      document.getElementById('local').value = '';
      document.getElementById('visitante').value = '';
      document.getElementById('fecha').value = '';

      cargarPartidos();
    } else {
      msg.innerText = "❌ Error";
      msg.style.color = "red";
    }

  } catch (err) {
    console.error(err);
    msg.innerText = "❌ Error servidor";
    msg.style.color = "red";
  }
}

async function resetearTodo() {

  const clave = prompt("Escribe ADMIN para confirmar reset");

if (clave !== "ADMIN") {
  alert("Cancelado");
  return;
}
  if (!ok) return;

  const res = await fetch('/reset', {
    method: 'POST'
  });

  if (!res.ok) {
    alert("Error al resetear");
    return;
  }

  alert("🔥 Sistema reiniciado");

  location.reload();
}

async function cargarPartidos() {
  const lista = document.getElementById('lista');

  try {
    const jornada = document.getElementById('jornada').value;
    const res = await fetch(`/partidos?jornada=${jornada}`);
    const data = await res.json();

    lista.innerHTML = '<h2>📋 Partidos</h2>';

   data.forEach(p => {
  lista.innerHTML += `
    <div class="partido">

      <b>${p.local} vs ${p.visitante}</b><br>
      ${new Date(p.fecha).toLocaleString()}<br><br>

      <input type="number" id="rl${p.id}" placeholder="Goles local">
      <input type="number" id="rv${p.id}" placeholder="Goles visitante">

      <button onclick="guardarResultado(${p.id})">
        Guardar Resultado
      </button>

    </div>
  `;
});

  } catch (err) {
    console.error(err);
  }
}

cargarPartidos();

async function guardarResultado(id) {
  const gl = document.getElementById("rl"+id).value;
  const gv = document.getElementById("rv"+id).value;

  if (gl === "" || gv === "") {
    alert("Pon marcador");
    return;
  }

  try {
    const res = await fetch('/admin/resultado', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        partido_id: id,
        goles_local: parseInt(gl),
        goles_visitante: parseInt(gv)
      })
    });

    const data = await res.json();

    if (data.ok) {
      alert("✅ Resultado guardado");
    } else {
      alert("❌ Error");
    }

  } catch (err) {
    console.error(err);
    alert("❌ Error servidor");
  }
}

</script>


</body>
</html>
