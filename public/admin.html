<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Quiniela</title>

  <style>
    body {
      font-family: Arial;
      background: #0b1d3a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .card {
      background: #132a4f;
      padding: 20px;
      border-radius: 15px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    /* 🔥 NUEVO: contenedor flexible */
    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .form-row input,
    .form-row select,
    .form-row button {
      flex: 1;
      min-width: 140px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    input, select {
      background: #eee;
      color: black;
    }

    button {
      background: #00c853;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #00a844;
    }

    .msg {
      margin-top: 10px;
      font-weight: bold;
    }

    .lista {
      margin-top: 30px;
    }

    .partido {
      background: #1f3c6b;
      padding: 10px;
      border-radius: 10px;
      margin: 5px;
    }

    /* 📱 RESPONSIVE */
    @media (max-width: 768px) {
      .form-row {
        flex-direction: column;
      }

      .card {
        width: 90%;
      }
    }

  </style>
</head>
<body>

<h1>⚙️ Panel Admin Quiniela</h1>

<div class="card">

  <div class="form-row">

    <input type="text" id="local" placeholder="Equipo local">
    <input type="text" id="visitante" placeholder="Equipo visitante">

    <input type="datetime-local" id="fecha">

    <input type="text" id="liga" placeholder="Ej: Liga MX J13">

    <input type="text" id="logo_local" placeholder="URL logo local">
    <input type="text" id="logo_visitante" placeholder="URL logo visitante">

    <select id="jornada">
      <option value="1">Semana 1</option>
      <option value="2">Semana 2</option>
      <option value="3">Semana 3</option>
      <option value="4">Semana 4</option>
    </select>

    <button onclick="crearPartido()">Crear Partido</button>

  </div>

  <div class="msg" id="msg"></div>

</div>

<div class="lista" id="lista"></div>

<script>

async function crearPartido() {
  const local = document.getElementById('local').value;
  const visitante = document.getElementById('visitante').value;
  const fecha = document.getElementById('fecha').value;
  const jornada = document.getElementById('jornada').value;

  const msg = document.getElementById('msg');

  if (!local || !visitante || !fecha) {
    msg.innerText = "⚠️ Completa todos los campos";
    msg.style.color = "orange";
    return;
  }

  try {
    const res = await fetch('/admin/partidos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        local,
        visitante,
        fecha,
        jornada
      })
    });

    const data = await res.json();

    if (data.ok) {
      msg.innerText = "✅ Partido guardado";
      msg.style.color = "lightgreen";

      document.getElementById('local').value = '';
      document.getElementById('visitante').value = '';
      document.getElementById('fecha').value = '';

      cargarPartidos();
    } else {
      msg.innerText = "❌ Error";
      msg.style.color = "red";
    }

  } catch (err) {
    console.error(err);
    msg.innerText = "❌ Error servidor";
    msg.style.color = "red";
  }
}

async function cargarPartidos() {
  const lista = document.getElementById('lista');

  try {
    const res = await fetch('/partidos?jornada=1');
    const data = await res.json();

    lista.innerHTML = '<h2>📋 Partidos</h2>';

    data.forEach(p => {
      lista.innerHTML += `
        <div class="partido">
          ${p.local} vs ${p.visitante} <br>
          ${new Date(p.fecha).toLocaleString()}
        </div>
      `;
    });

  } catch (err) {
    console.error(err);
  }
}

cargarPartidos();

</script>

</body>
</html>
