<script>
let editandoId = null;
 function logout() {
  sessionStorage.removeItem("admin");
  window.location.href = "login.html";
}

  function descargarExcelAdmin() {
  const jornada = document.getElementById("jornada").value;

  if (!jornada) {
    alert("Selecciona una jornada");
    return;
  }

  window.open(`/exportar-excel?jornada=${jornada}`, "_blank");
}

async function crearPartido() {
  const local = document.getElementById('local').value;
  const visitante = document.getElementById('visitante').value;
  const fecha = document.getElementById('fecha').value;
  const jornada = document.getElementById('jornada').value;
  const liga = document.getElementById('liga').value;
  const logo_local = document.getElementById('logo_local').value;
  const logo_visitante = document.getElementById('logo_visitante').value;

  const msg = document.getElementById('msg');

  if (!local || !visitante || !fecha) {
    msg.innerText = "⚠️ Completa todos los campos";
    msg.style.color = "orange";
    return;
  }

  try {
if (editandoId) {

  const res = await fetch(
    `/admin/partido/${editandoId}`,
    {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        local,
        visitante,
        fecha,
        jornada,
        liga,
        logo_local,
        logo_visitante
      })
    }
  );

  const data = await res.json();

  if (data.ok) {

    document.getElementById("msg").innerHTML =
      "✅ Partido actualizado";

    editandoId = null;

    document.getElementById('local').value = '';
    document.getElementById('visitante').value = '';
    document.getElementById('fecha').value = '';
    document.getElementById('liga').value = '';
    document.getElementById('logo_local').value = '';
    document.getElementById('logo_visitante').value = '';

    cargarPartidos();

    return;
  }
}

const res = await fetch('/admin/partidos', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({
    local,
    visitante,
    fecha,
    jornada,
    liga,
    logo_local,
    logo_visitante
  })
});

    const data = await res.json();

    if (data.ok) {
      msg.innerText = "✅ Partido guardado";
      msg.style.color = "lightgreen";

      document.getElementById('local').value = '';
      document.getElementById('visitante').value = '';
      document.getElementById('fecha').value = '';

      cargarPartidos();
    } else {
      msg.innerText = "❌ Error";
      msg.style.color = "red";
    }

  } 
  catch (err) {

  console.error(err);

  msg.innerText = "❌ Error al guardar partido";
  msg.style.color = "red";

}
}

async function resetearTodo() {

  const password = prompt("🔐 Ingresa la contraseña:");

  if (!password) return;

  const confirmacion = confirm("⚠️ Esto borrará TODO ¿Estás seguro?");
  if (!confirmacion) return;

  const res = await fetch('/reset', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ password })
  });

  const data = await res.json();

  if (!res.ok) {
    alert(data.error || "❌ Error al resetear");
    return;
  }

  alert("🔥 Sistema reiniciado");

  location.reload();
}

async function cargarEstadoJornada() {

  const jornada = document.getElementById("jornada").value;

  const res = await fetch(`/limite?jornada=${jornada}`);
  const data = await res.json();

  const box = document.getElementById("estado-jornada");

  if (data.bloqueada) {

    box.innerHTML = `🔒 Semana ${jornada} cerrada`;
    box.className = "estado-jornada cerrada";

  } else {

    box.innerHTML = `🔓 Semana ${jornada} abierta`;
    box.className = "estado-jornada abierta";
  }
}

async function cargarPartidos() {

  cargarDashboard();

  const lista = document.getElementById('lista');

  try {
    const jornada = document.getElementById('jornada').value;
    const res = await fetch(`/partidos?jornada=${jornada}`);
    const data = await res.json();

    if (!res.ok) {
  alert(data.error); // 🔥 AQUÍ VERÁS EL ERROR REAL
  return;
}

    lista.innerHTML = '<h2>📋 Partidos</h2>';
  
    window.partidosAdmin = data;
  
    data.forEach(p => {
  lista.innerHTML += `
    <div class="partido">

      <b>${p.local} vs ${p.visitante}</b><br>
      ${p.fecha.substring(0,16).replace('T',' ')}<br><br>

      <input type="number" id="rl${p.id}" placeholder="Goles local">
      <input type="number" id="rv${p.id}" placeholder="Goles visitante">

      <button onclick="guardarResultado(${p.id})">
        Guardar Resultado
      </button>

      <button
        class="btn-editar"
        onclick="editarPartido(${p.id})">
        ✏️ Editar
      </button>

      <button class="btn-eliminar"onclick="eliminarPartido(${p.id})">
        🗑 Eliminar
      </button>

    </div>
  `;
});

  } catch (err) {
    console.error(err);
  }
}

cargarPartidos();


async function guardarResultado(id) {
  const gl = document.getElementById("rl"+id).value;
  const gv = document.getElementById("rv"+id).value;

  if (gl === "" || gv === "") {
    alert("Pon marcador");
    return;
  }

  try {
    const res = await fetch('/admin/resultado', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        partido_id: id,
        goles_local: parseInt(gl),
        goles_visitante: parseInt(gv)
      })
    });

    const data = await res.json();

    if (data.ok) {
      alert("✅ Resultado guardado");
    } else {
      alert("❌ Error");
    }

  } catch (err) {
    console.error(err);
    alert("❌ Error servidor");
  }
}

async function eliminarPartido(id) {

  const confirmar = confirm(
    "⚠️ ¿Eliminar este partido?"
  );

  if (!confirmar) return;

  try {

    const res = await fetch(
      `/admin/partido/${id}`,
      {
        method: 'DELETE'
      }
    );

    const data = await res.json();

    if (data.ok) {

      alert("✅ Partido eliminado");

      cargarPartidos();

    } else {

      alert("❌ Error");

    }

  } catch (err) {

    console.error(err);

    alert("❌ Error servidor");

  }
}

function editarPartido(id) {

  const partido = window.partidosAdmin.find(
    p => p.id == id
  );

  if (!partido) return;

  editandoId = id;

  document.getElementById("local").value =
    partido.local || "";

  document.getElementById("visitante").value =
    partido.visitante || "";

  document.getElementById("fecha").value =
    partido.fecha.substring(0,16);

  document.getElementById("logo_local").value =
    partido.logo_local || "";

  document.getElementById("logo_visitante").value =
    partido.logo_visitante || "";

  document.getElementById("liga").value =
    partido.liga || "";

    document.getElementById("jornada").value =
    partido.jornada;

  document.getElementById("msg").innerHTML =
    "✏️ Editando partido #" + id;

  window.scrollTo({
    top:0,
    behavior:"smooth"
  });

}

async function cargarDashboard() {

  const jornada =
    document.getElementById("jornada").value;

  const bolsaRes =
    await fetch(`/bolsa?jornada=${jornada}`);

  const bolsa =
    await bolsaRes.json();

  const limiteRes =
    await fetch(`/limite?jornada=${jornada}`);

  const limite =
    await limiteRes.json();

  document.getElementById(
  "dashboardAdmin"
).innerHTML = `

  <div class="dashboard-top">
    ${
      limite.bloqueada
      ? `🔒 Semana ${jornada} Cerrada`
      : `🔓 Semana ${jornada} Abierta`
    }
  </div>

  <div class="dashboard-stats">

    <div class="dashboard-item">
      👥 Participantes
      <b>${bolsa.participantes}</b>
    </div>

    <div class="dashboard-item">
      💰 Recaudado
      <b>$${bolsa.recaudado}</b>
    </div>

    <div class="dashboard-item">
      🥇 Primer Lugar
      <b>$${Math.round(bolsa.primerLugar)}</b>
    </div>

    ${
      bolsa.segundoLugar > 0
      ? `
      <div class="dashboard-item">
        🥈 Segundo Lugar
        <b>$${Math.round(bolsa.segundoLugar)}</b>
      </div>
      `
      : `
      <div class="dashboard-item">
        👥 Premio único
        <b>Hasta 750 participantes</b>
      </div>
      `
    }

  </div>

`;

}

async function verParticipantes() {

  const jornada =
    document.getElementById("jornada").value;

  const res =
    await fetch(`/admin/participantes?jornada=${jornada}`);

  const data =
    await res.json();

  const div =
    document.getElementById("listaParticipantes");

  div.innerHTML =
    `<h2>👥 PARTICIPANTES SEMANA ${jornada}</h2>`;

  data.forEach((p, i) => {

    const fecha =
      new Date(p.fecha_envio).toLocaleString("es-MX");

    div.innerHTML += `
      <div class="partido">

        <b>${i + 1}. ${p.nombre}</b><br>

        📱 ${p.telefono || "Sin teléfono"}<br>

        📅 ${fecha}<br><br>

        <a
          href="https://wa.me/52${p.telefono}"
          target="_blank"
          class="btn-verde"
        >
          💬 Abrir WhatsApp
        </a>

      </div>
    `;
  });

}

async function abrirEditorPronosticos() {

  alert("Entré al editor");

    document.getElementById("editorPronosticos").style.display = "block";

    alert("Voy a cargar jugadores");
    
    const jornadaActual =
        document.getElementById("jornada").value;

    const select =
        document.getElementById("jornadaEditar");

    select.innerHTML = "";

    for(let i=1;i<=60;i++){

        select.innerHTML += `
            <option value="${i}">
                Semana ${i}
            </option>
        `;

    }

    select.value = jornadaActual;

   await cargarJugadores();

}

async function cambiarJornadaEditor(){

    jugadorSeleccionado = null;

    document.getElementById("buscarJugador").value = "";

    document.getElementById("listaPronosticos").innerHTML = `
        <div style="
            text-align:center;
            padding:40px;
            color:#999;
            font-size:18px;">
            👈 Selecciona un participante.
        </div>
    `;

    document.getElementById(
        "btnGuardarPronosticos"
    ).style.display = "none";

    await cargarJugadores();

}

async function cargarJugadores(){

    alert("1");

    const jornada =
        document.getElementById("jornadaEditar").value;

    alert("Jornada: " + jornada);

    const r =
        await fetch(`/admin/jugadores?jornada=${jornada}`);

    alert("Status: " + r.status);

    const jugadores =
        await r.json();

    alert("Jugadores: " + jugadores.length);

    window.jugadoresEditor = jugadores;

    alert("Voy a mostrar");

    mostrarJugadores(jugadores);

    alert("Terminé");

}
function mostrarJugadores(jugadores){

    const lista =
        document.getElementById("listaJugadores");

    lista.innerHTML = "";

    jugadores.forEach(j=>{

        lista.innerHTML += `

<div class="partido jugador-item"
     onclick="seleccionarJugador(${j.id})">

    👤 ${j.nombre}

</div>

`;

    });

}

document
.getElementById("buscarJugador")
.addEventListener("keyup",()=>{

    const texto =
        document
        .getElementById("buscarJugador")
        .value
        .toLowerCase();

    const filtrados =
        window.jugadoresEditor.filter(j=>

            j.nombre
            .toLowerCase()
            .includes(texto)

        );

    mostrarJugadores(filtrados);

});

let jugadorSeleccionado = null;

async function seleccionarJugador(id,elemento){

    jugadorSeleccionado = id;

    const jugador =
        window.jugadoresEditor.find(j => j.id == id);

    document.getElementById("tituloJugador").style.display = "block";

    document.getElementById("tituloJugador").innerHTML =
        `👤 Editando: <span style="color:#2563eb">${jugador.nombre}</span>`;

    document.querySelectorAll(".jugador-item").forEach(item=>{

        item.style.background = "";
        item.style.border = "";

    });

    elemento.style.background="#DBEAFE";
    elemento.style.border="2px solid #2563EB";

    await cargarPronosticos();

}

async function cargarPronosticos(){

    if(!jugadorSeleccionado){

        document.getElementById("listaPronosticos").innerHTML = `
            <div style="
                text-align:center;
                padding:40px;
                color:#999;
                font-size:18px;">
                👈 Selecciona un participante para editar su quiniela.
            </div>
        `;

        document.getElementById(
            "btnGuardarPronosticos"
        ).style.display = "none";

        return;
    }

    const jornada =
        document.getElementById("jornadaEditar").value;

  }
async function guardarCambiosPronosticos(){

    if(!jugadorSeleccionado){
        alert("Selecciona un jugador.");
        return;
    }

    const pronosticos = [];

    document
        .querySelectorAll("#listaPronosticos .partido")
        .forEach(div=>{

            const gl = div.querySelector("input[id^='gl-']");
            const gv = div.querySelector("input[id^='gv-']");

            pronosticos.push({

                user_id: jugadorSeleccionado,

                partido_id: parseInt(
                    gl.id.replace("gl-","")
                ),

                goles_local: parseInt(gl.value),

                goles_visitante: parseInt(gv.value)

            });

        });

    try{

        const res = await fetch(
            "/admin/editar-pronosticos",
            {

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    pronosticos
                })

            }
        );

        const data = await res.json();

        if(data.ok){

            alert("✅ Pronósticos actualizados correctamente.");

        }else{

            alert(data.error || "Error");

        }

    }catch(err){

        console.error(err);

        alert("❌ Error del servidor.");

    }

}
