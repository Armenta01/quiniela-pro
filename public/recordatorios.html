<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Recordatorios</title>

<link rel="stylesheet" href="styles.css">
<link rel="icon" href="logo.png">

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
    color:#22c55e;
}

#cantidad{

    text-align:center;

    font-size:18px;

    margin:20px;

}

.card{

    background:#1e293b;

    padding:15px;

    border-radius:12px;

    margin-bottom:12px;

}

.nombre{

    font-size:20px;

    font-weight:bold;

}

.telefono{

    color:#cbd5e1;

    margin:8px 0;

}

button{

    background:#22c55e;

    color:white;

    border:none;

    padding:10px 18px;

    border-radius:10px;

    cursor:pointer;

}

button:hover{

    opacity:.9;

}

.reiniciar-btn{

    background:#f59e0b;

    color:white;

    border:none;

    padding:14px 24px;

    border-radius:12px;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    margin:20px auto;

    display:block;

}

.reiniciar-btn:hover{

    background:#d97706;

}

.fecha-recordatorio{

    margin-top:10px;

    color:#94a3b8;

    font-size:14px;

    font-weight:bold;

}

.estado-pendiente{

    margin-top:10px;

    color:#22c55e;

    font-size:15px;

    font-weight:bold;

}

</style>

</head>

<body>

<h1>📲 Recordatorios</h1>

<button class="reiniciar-btn" onclick="reiniciarRecordatorios()">
🔄 Reiniciar Recordatorios
</button>

<div id="cantidad"></div>

<input
    id="buscar"
    type="text"
    placeholder="🔍 Buscar participante..."
    onkeyup="filtrarParticipantes()"
    style="
        width:100%;
        max-width:450px;
        display:block;
        margin:20px auto;
        padding:12px;
        border-radius:10px;
        border:none;
        font-size:16px;
    "
>

<div id="lista"></div>

<script src="recordatorios.js"></script>

</body>

</html>
